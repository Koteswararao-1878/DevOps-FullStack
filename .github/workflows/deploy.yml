name: Deploy SkillSwap Platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Test Backend
  # ──────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Check backend starts without error
        run: |
          cd backend
          node -e "require('./server.js')" &
          sleep 3
          kill %1 || true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PORT: 5000

  # ──────────────────────────────────────────
  # JOB 2: Test Frontend Build
  # ──────────────────────────────────────────
  test-frontend:
    name: Test Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  # ──────────────────────────────────────────
  # JOB 3: Deploy Frontend to Vercel
  # ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: frontend

  # ──────────────────────────────────────────
  # JOB 4: Deploy Backend to Render
  # ──────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Wait for Render deploy
        run: |
          echo "Waiting for Render to deploy..."
          sleep 30
          echo "Deploy triggered successfully!"

  # ──────────────────────────────────────────
  # JOB 5: Health Check after deploy
  # ──────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check backend health
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.REACT_APP_API_URL }}/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Backend is healthy!"
          else
            echo "Backend returned status: $STATUS (may still be starting)"
          fi

      - name: Check frontend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://skill-swap-platform-theta.vercel.app || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is live!"
          else
            echo "Frontend returned status: $STATUS"
          fi

      - name: Deploy Summary
        run: |
          echo "SkillSwap Deploy Complete!"
          echo "Frontend: https://skill-swap-platform-theta.vercel.app"
          echo "Backend:  ${{ secrets.REACT_APP_API_URL }}"
