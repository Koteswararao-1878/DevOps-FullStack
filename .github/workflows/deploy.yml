name: Deploy SkillSwap Platform

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ──────────────────────────────────────────
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Check
        run: |
          cd backend
          timeout 5 node -e "require('./server.js')" || true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          PORT: 5000

      # ──────────────────────────────────────────
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build React App
        run: |
          cd frontend
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false

      # ──────────────────────────────────────────
      - name: Deploy Backend to Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      # ──────────────────────────────────────────
      - name: Install Vercel CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install -g vercel@latest

      - name: Deploy Frontend to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ──────────────────────────────────────────
      - name: Health Check Backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for services to start..."
          sleep 40
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.REACT_APP_API_URL }}/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              break
            fi
            echo "Attempt $i: Backend returned $STATUS, retrying in 20s..."
            sleep 20
          done

      - name: Health Check Frontend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://skill-swap-platform-theta.vercel.app || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is live!"
          else
            echo "Frontend returned status: $STATUS"
          fi

      - name: Deploy Summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "SkillSwap Deploy Complete!"
          echo "Frontend: https://skill-swap-platform-theta.vercel.app"
          echo "Backend:  ${{ secrets.REACT_APP_API_URL }}"